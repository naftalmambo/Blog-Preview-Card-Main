<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link href="https://googleapis.com" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>

    <main class="card">

    <div class="logo">
      <img src="assets/images/illustration-article.svg" alt="Logo image">
    </div>
    
    <div class="card-badge">Learning</div>

    <div class="card-date">Published 21 Dec 2023</div>

    <div class="card-title">HTML & CSS foundations</div>

    <div class="card-description">
      These languages are the backbone of every website, defining structure,
      content, and presentation.
    </div>
  <div class="card-author">
    <img src="assets/images/image-avatar.webp" alt="Greg Hooper" class="card-author-img">
    <span class="card-author-name">Greg Hooper</span>
  </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>

    </main>
  </body>
</html>
