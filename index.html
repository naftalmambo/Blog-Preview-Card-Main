<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="card">
      <div class="logo">
        <img src="assets/images/illustration-article.svg" alt="Logo image" />
      </div>

      <a href="#" class="card-badge">Learning</a>

      <time class="card-date" datetime="2023-12-21">Published 21 Dec 2023</time>

      <h2 class="card-title">
        <a href="#">HTML & CSS foundations</a>
      </h2>

      <div class="card-description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </div>
      <div class="card-author">
        <img
          class="card-author-img"
          src="assets/images/image-avatar.webp"
          alt="Avatar of Greg Hooper"
        />
        <span class="card-author-name">Greg Hooper</span>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/naftalmambo/" target="_blank" rel="noopener noreferrer">Naftal Mambo</a>.
    </footer>
  </body>
</html>
